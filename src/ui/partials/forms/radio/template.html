<label class="radio-crd border rounded mb-3 p-3 d-flex align-items-center">
    <input class="form-check-input m-0 flex-shrink-0" 
           type="radio" 
           name="{{id}}" 
           value="{{value}}" 
           {{#if checked}}checked{{/if}}
           required
    >
    <span class="ms-3 mb-0 w-100 text-break">{{label}}</span>
</label>
