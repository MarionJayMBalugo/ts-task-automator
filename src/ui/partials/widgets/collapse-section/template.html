<div class="bg-white rounded border shadow-sm d-flex flex-column">
    <div class="p-4 d-flex justify-content-between align-items-center" 
         data-bs-toggle="collapse" 
         data-bs-target="#{{ id }}" >
        
        <span class="section-label mb-0">{{ title }}</span>
        <svg class="collapse-chevron" width="16" height="16"><use href="#icon-chevron-down"></use></svg>
    </div>

    <div class="collapse show flex-grow-1" id="{{ id }}">
        <div class="p-4">
            {{ slot }}
        </div>
    </div>
</div>
