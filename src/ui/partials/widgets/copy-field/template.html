<div class="copy-field-wrapper">
    <div class="text-muted small text-uppercase fw-bold mb-1">
        {{ label }}
    </div>
    <div class="d-flex align-items-center gap-2">
        <div class="{{ textClass || 'text-dark' }} fw-bold" id="{{ id }}">
            {{ slot }}
        </div>
        <button class="btn btn-sm btn-link text-muted p-0 ms-1 btn-copy" 
                data-copy="{{ id }}" 
                title="Copy to clipboard">
            <svg width="14" height="14"><use href="#icon-copy"></use></svg>
        </button>
    </div>
</div>
