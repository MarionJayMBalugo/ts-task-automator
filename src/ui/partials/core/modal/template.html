<div id="modal-overlay" class="modal-backdrop">
    <div class="tms-modal">
        <div id="modal-stepper-container" class="position-relative mb-4 px-2"></div>

        <h3 id="modal-title" class="tms-modal-title"></h3>
        <p id="modal-body" class="tms-modal-body"></p>
        
        <div id="modal-dynamic-content" class="mb-4 text-start"></div>
        
        <div class="d-flex gap-2">
            <button id="modal-cancel-btn" onclick="closeModal()" class="btn btn-light flex-grow-1 fw-bold text-muted tms-modal-btn">__('field.cancel')</button>
            <button id="modal-prev-btn" class="btn btn-outline-primary flex-grow-1 fw-bold tms-modal-btn">__('field.prev')</button>
            <button id="modal-confirm-btn" class="btn btn-primary flex-grow-1 fw-bold tms-modal-btn">__('field.execute')</button>
        </div>
    </div>
</div>

<template id="tpl-stepper-wrapper">
    <div class="d-flex justify-content-between align-items-center w-100 mb-4 mt-1">{{content}}</div>
</template>

<template id="tpl-stepper-item">
    <div class="tms-step-icon {{statusClass}}">{{iconContent}}</div>
    {{lineContent}}
</template>

<template id="tpl-stepper-line">
    <div class="tms-step-line {{lineClass}} mx-1"></div>
</template>

<template id="tpl-stepper-check">
    <svg width="14" height="14"><use href="#icon-stepper-check"></use></svg>
</template>
