<div id="modal-overlay" class="modal-backdrop" style="display: none;">
    <div class="tms-modal">
        <div id="modal-stepper-container" class="position-relative mb-4 px-2" style="display: none;"></div>

        <h3 id="modal-title" class="tms-modal-title"></h3>
        <p id="modal-body" class="tms-modal-body"></p>
        
        
        <div id="modal-dynamic-content" class="mb-4 text-start" style="display: none;"></div>
        
        <div class="d-flex gap-2">
            <button onclick="closeModal()" class="btn btn-light flex-grow-1 fw-bold text-muted tms-modal-btn" i18n="field.cancel"></button>
