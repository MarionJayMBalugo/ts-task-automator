<div id="settings-view" class="app-view">
    <div class="d-flex justify-content-between align-items-start mb-5">
        <div>
            <h2 class="h4 fw-bold mb-1" i18n="settings.title"></h2>
            <p class="text-muted small" i18n="settings.subtitle"></p>
        </div>
    </div>

    <div class="mb-4">
        <span class="section-label d-flex align-items-center gap-2 mb-2">
            <svg width="16" height="16" class="text-primary"><use href="#icon-folder"></use></svg>
            <span i18n="settings.workspace"></span>
        </span>
        <div class="bg-white p-4 rounded border shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h6 class="fw-bold mb-1" i18n="settings.scriptDirTitle"></h6>
                    <p class="text-muted small mb-0" i18n="settings.scriptDirDesc"></p>
                </div>
                <button class="btn btn-outline-primary btn-sm fw-bold d-flex align-items-center gap-2" onclick="App.changeFolder()">
                    <svg width="14" height="14"><use href="#icon-folder"></use></svg>
                    <span i18n="settings.browseBtn"></span>
                </button>
            </div>
            <div class="bg-light p-2 rounded border small text-muted text-truncate mb-3" id="settings-path-info" i18n="settings.checkingDir">
                </div>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <button class="btn btn-outline-success btn-sm fw-bold d-flex align-items-center gap-2" onclick="App.copyScripts()">
                    <svg width="16" height="16"><use href="#icon-export"></use></svg>
                    <span>Export Default Scripts</span>
                </button>
                
                <button class="btn btn-outline-danger btn-sm fw-bold d-flex align-items-center gap-2" onclick="App.resetConfig()">
                    <svg width="16" height="16"><use href="#icon-refresh"></use></svg>
                    <span>Reset to Default</span>
                </button>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <span class="section-label d-flex align-items-center gap-2 mb-2">
            <svg width="16" height="16" class="text-secondary"><use href="#icon-hard-drive"></use></svg>
            <span i18n="settings.driveConfig"></span>
        </span>
        <div class="bg-white p-4 rounded border shadow-sm">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="fw-bold mb-1" i18n="settings.targetDriveTitle"></h6>
                    <p class="text-muted small mb-0" i18n="settings.targetDriveDesc"></p>
                </div>
                <div class="w-25">
                    <select class="form-select fw-bold text-primary border-primary" id="target-drive-select" onchange="App.changeTargetDrive(this.value)">
                        <option value="C:\" i18n="settings.drives.c"></option>
                        <option value="D:\" i18n="settings.drives.d"></option>
                        <option value="E:\" i18n="settings.drives.e"></option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <span class="section-label d-flex align-items-center gap-2 mb-2">
            <svg width="16" height="16" class="text-secondary"><use href="#icon-terminal"></use></svg>
            <span i18n="settings.execPrefs"></span>
        </span>
        <div class="bg-white p-4 rounded border shadow-sm">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="fw-bold mb-1" i18n="settings.autoCloseTitle"></h6>
                    <p class="text-muted small mb-0" i18n="settings.autoCloseDesc"></p>
                </div>
                <div class="form-check form-switch fs-4 m-0">
                    <input class="form-check-input" type="checkbox" id="auto-close-switch" onchange="App.toggleAutoClose(this.checked)">
                </div>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
            <div>
                <h6 class="fw-bold mb-1" i18n="settings.darkModeTitle">Dark Mode</h6>
                <p class="text-muted small mb-0" i18n="settings.darkModeDesc">Switch to the dark theme interface.</p>
            </div>
            <div class="form-check form-switch fs-4 m-0">
                <input class="form-check-input" type="checkbox" id="dark-mode-switch" onchange="App.toggleDarkMode(this.checked)">
            </div>
        </div>
    </div>
    <div class="mb-4">
        <span class="section-label d-flex align-items-center gap-2 mb-2">
            <svg width="16" height="16" class="text-info"><use href="#icon-info"></use></svg>
            <span i18n="settings.appInfo"></span>
        </span>
        <div class="bg-white p-4 rounded border shadow-sm">
            <div class="row">
                <!-- <div class="col-md-6 mb-3">
                    <h6 class="fw-bold mb-1" i18n="settings.version"></h6>
                    <p class="text-muted small mb-0" id="setting-app-version">TMS Pulse v1.0.0</p>
                </div>
                <div class="col-md-6 mb-3">
                    <h6 class="fw-bold mb-1" i18n="settings.engine"></h6>
                    <p class="text-muted small mb-0" id="setting-electron-version">v40.8.0</p>
                </div> -->
                <div class="col-md-12">
                    <h6 class="fw-bold mb-1" i18n="settings.developer"></h6>
                    <p class="text-muted small mb-0" id="setting-developer">TMS Technical Specialist Team</p>
                </div>
            </div>
        </div>
    </div>
</div>
