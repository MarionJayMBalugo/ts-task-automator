<div id="settings-view" class="app-view">
    <div class="mb-4" data-component="widgets/collapse-section/template" data-id="collapsewp" data-title="{{ __('settings.workspace') }}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h6 class="fw-bold mb-1">__('settings.scriptDirTitle')</h6>
                <p class="text-muted small mb-0">__('settings.scriptDirDesc')</p>
            </div>
            <button class="btn btn-outline-primary btn-sm fw-bold d-flex align-items-center gap-2" data-action="change-folder">
                <svg width="14" height="14"><use href="#icon-folder"></use></svg>
                <span>__('settings.browseBtn')</span>
            </button>
        </div>
        <div class="bg-light p-2 rounded border small text-muted text-truncate mb-3" id="settings-path-info">
            __('settings.checkingDir')
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <button class="btn btn-outline-success btn-sm fw-bold d-flex align-items-center gap-2" data-action="copy-scripts">
                <svg width="16" height="16"><use href="#icon-export"></use></svg>
                <span>Export Default Scripts</span>
            </button>
            
            <button class="btn btn-outline-danger btn-sm fw-bold d-flex align-items-center gap-2" data-action="reset-config">
                <svg width="16" height="16"><use href="#icon-refresh"></use></svg>
                <span>Reset to Default</span>
            </button>
        </div>
    </div>

    <div class="mb-4" data-component="widgets/collapse-section/template" data-id="collapsedrvcnf" data-title="{{ __('settings.driveConfig') }}">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h6 class="fw-bold mb-1">__('settings.targetDriveTitle')</h6>
                <p class="text-muted small mb-0">__('settings.targetDriveDesc')</p>
            </div>
            <div class="w-25">
                <select class="form-select fw-bold text-primary border-primary" id="target-drive-select" data-action="change-drive">
                    <option value="C:\">__('settings.drives.c')</option>
                    <option value="D:\">__('settings.drives.d')</option>
                    <option value="E:\">__('settings.drives.e')</option>
                </select>
            </div>
        </div>
    </div>

    <div class="mb-4" data-component="widgets/collapse-section/template" data-id="collapseexecprf" data-title="{{ __('settings.execPrefs') }}">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h6 class="fw-bold mb-1">__('settings.autoCloseTitle')</h6>
                <p class="text-muted small mb-0">__('settings.autoCloseDesc')</p>
            </div>
            <div class="form-check form-switch fs-4 m-0">
                <input class="form-check-input" type="checkbox" id="auto-close-switch" data-action="toggle-auto-close">
            </div>
        </div>
    </div>

    <div class="mb-4" data-component="widgets/collapse-section/template" data-id="collapsedrkmd" data-title="{{ __('settings.darkModeTitle') }}">
        <div class="form-check form-switch fs-4 m-0">
            <input class="form-check-input" type="checkbox" id="dark-mode-switch" data-action="toggle-dark-mode">
        </div>
    </div>

    <div class="mb-4">
        <span class="section-label d-flex align-items-center gap-2 mb-2">
            <svg width="16" height="16" class="text-info"><use href="#icon-info"></use></svg>
            <span>__('settings.appInfo')</span>
        </span>
        <div class="bg-white p-4 rounded border shadow-sm">
            <div class="row">
                <div class="col-md-12">
                    <h6 class="fw-bold mb-1">__('settings.developer')</h6>
                    <p class="text-muted small mb-0" id="setting-developer">TMS Technical Specialist Team</p>
                </div>
            </div>
        </div>
    </div>
</div>
