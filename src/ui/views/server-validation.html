<div id="server-validation-view" class="app-view">
    <div class="d-flex justify-content-between align-items-start mb-5">
        <div>
            <h2 class="h4 fw-bold mb-1" i18n="validation.title"></h2>
            <p class="text-muted small mb-0" i18n="validation.subtitle"></p>
        </div>
        <button class="btn btn-primary fw-bold shadow-sm px-4 py-2 d-flex align-items-center gap-2" onclick="App.runValidation(true)">
            <svg width="18" height="18"><use href="#icon-refresh"></use></svg>
            <span i18n="validation.refresh"></span>
        </button>
    </div>

    <div class="mb-5">
        <span class="section-label" i18n="validation.quickAccess"></span>
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3">
            <div class="col">
                <div class="action-card" i18n-desc="desc.sysIpconfig" onclick="App.openTool('ipconf')">
                    <div class="action-icon d-flex align-items-center justify-content-center text-secondary">
                        <svg width="20" height="20"><use href="#icon-terminal"></use></svg>
                    </div>
                    <div class="action-label" i18n="validation.btns.ipconfig"></div>
                </div>
            </div>
            <div class="col">
                <div class="action-card" i18n-desc="desc.sysDxdiag" onclick="App.openTool('dxdiag')">
                    <div class="action-icon d-flex align-items-center justify-content-center text-secondary">
                        <svg width="20" height="20"><use href="#icon-cpu"></use></svg>
                    </div>
                    <div class="action-label" i18n="validation.btns.dxdiag"></div>
                </div>
            </div>
            <div class="col">
                <div class="action-card" i18n-desc="desc.openDir" data-dir-name="Drive D:" onclick="App.openTool('openDrv')">
                    <div class="action-icon d-flex align-items-center justify-content-center text-primary">
                        <svg width="20" height="20"><use href="#icon-folder"></use></svg>
                    </div>
                    <div class="action-label" i18n="validation.btns.driveD"></div>
                </div>
            </div>
            <div class="col">
                <div class="action-card" i18n-desc="desc.openDir" data-dir-name="This PC" onclick="App.openTool('explorer')">
                    <div class="action-icon d-flex align-items-center justify-content-center text-secondary">
                        <svg width="20" height="20"><use href="#icon-monitor"></use></svg>
                    </div>
                    <div class="action-label" i18n="validation.btns.thisPc"></div>
                </div>
            </div>
            <div class="col">
                <div class="action-card" i18n-desc="desc.sysAbout" onclick="App.openTool('about')">
                    <div class="action-icon d-flex align-items-center justify-content-center text-info">
                        <svg width="20" height="20"><use href="#icon-info"></use></svg>
                    </div>
                    <div class="action-label" i18n="validation.btns.aboutPc"></div>
                </div>
            </div>
            <div class="col">
                <div class="action-card" i18n-desc="desc.taskMngr" onclick="App.openTool('taskmngr')">
                    <div class="action-icon d-flex align-items-center justify-content-center text-info">
                        <svg width="20" height="20"><use href="#icon-task-manager"></use></svg>
                    </div>
                    <div class="action-label" i18n="validation.btns.taskMngr"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-lg-6 col-12 d-flex flex-column" data-component="partials/sys-hw"></div>
        <div class="col-lg-6 col-12 d-flex flex-column" data-component="partials/sys-env"></div>
    </div>
</div>
