<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title i18n="app.title"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.bundle.css">
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand d-flex justify-content-between align-items-center">
        <div class="brand-text d-flex align-items-center">
            <img src="../assets/logo.png" alt="Logo" width="28" height="28" class="me-2" style="object-fit: contain;">
            <span><span i18n="app.titlesubone"></span> <span class="text-primary" i18n="app.titlesubtwo"></span></span>
        </div>
        <button id="sidebar-toggle" class="btn btn-sm text-white border-0 p-0" onclick="UI.toggleSidebar()">
            <div class="hamburger-icon" id="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>

    <a href="#" id="nav-dashboard" class="nav-link active" onclick="App.loadTab('dashboard')">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-folder"></use></svg></span>
        <span class="nav-text" i18n="sidebar.dashboard"></span>
    </a>

    <a href="#" id="nav-server-validation" class="nav-link" onclick="App.loadTab('server-validation')">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-shield"></use></svg></span>
        <span class="nav-text" i18n="sidebar.servervalidation"></span>
    </a>
    
    <a href="#" id="nav-server-installation" class="nav-link" onclick="App.loadTab('server-installation')">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-package"></use></svg></span>
        <span class="nav-text" i18n="sidebar.serverinstall"></span>
    </a>
    
    <a href="#" id="nav-settings" class="nav-link" onclick="App.loadTab('settings')">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-gear"></use></svg></span>
        <span class="nav-text" i18n="sidebar.settings"></span>
    </a>
    
    <div class="sidebar-footer">
        <span class="version-tag mb-1"><span i18n="app.title"></span> <span id="app-version-display">v0.0.0</span></span>
    </div>
</nav>

<div class="main-content">
    <div id="app-container">
        <div class="d-flex flex-column justify-content-center align-items-center text-muted tms-loader-wrapper">
            <h6 class="fw-bold mb-3 text-uppercase tms-loader-text" i18n="loader.description"></h6>
            <div class="tms-loader-bar">
                <div class="tms-loader-progress"></div>
            </div>
        </div>
    </div>
</div>
<script src="./js/lang/text.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
