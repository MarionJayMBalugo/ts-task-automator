<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title i18n="app.title"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.bundle.css">
</head>
<body>

<nav class="sidebar" id="sidebar">
    <a href="#" id="nav-dashboard" class="nav-link active" data-action="navigate" data-view="dashboard/template">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-folder"></use></svg></span>
        <span class="nav-text" i18n="sidebar.dashboard"></span>
    </a>

    <a href="#" id="nav-server-validation" class="nav-link" data-action="navigate" data-view="server-validation/template">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-shield"></use></svg></span>
        <span class="nav-text" i18n="sidebar.servervalidation"></span>
    </a>
    
    <a href="#" id="nav-server-installation" class="nav-link" data-action="navigate" data-view="server-installation/template">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-package"></use></svg></span>
        <span class="nav-text" i18n="sidebar.serverinstall"></span>
    </a>
    
    <a href="#" id="nav-settings" class="nav-link" data-action="navigate" data-view="settings/template">
        <span class="nav-icon"><svg width="16" height="16"><use href="#icon-gear"></use></svg></span>
        <span class="nav-text" i18n="sidebar.settings"></span>
    </a>
    
    <div class="sidebar-footer">
        <span class="version-tag mb-1"><span i18n="app.title"></span> <span id="app-version-display">v0.0.0</span></span>
    </div>
</nav>

<div class="main-content d-flex flex-column vh-100">

    <div class="content-header d-flex align-items-center flex-shrink-0">
        <button id="sidebar-toggle" class="btn btn-sm text-muted border-0 p-0 me-3 d-flex align-items-center" data-action="toggle-sidebar">
            <svg width="20" height="20"><use href="#icon-menu"></use></svg>
        </button>
        <div>
            <h2 id="headr-title" class="h4 fw-bold mb-1"></h2>
            <p id="headr-sbtitle" class="text-muted small mb-0"></p>
        </div>

        <div class="ms-auto" id="header-actions">
            <button id="header-btn-refresh" class="btn shadow-sm px-4 py-2 d-flex align-items-center gap-2 btn-runvalid" data-action="run-validation">
                <svg width="14" height="14"><use href="#icon-refresh"></use></svg>
                <span i18n="validation.refresh"></span>
            </button>
        </div>
    </div>
    
    <div id="app-container" class="flex-grow-1 overflow-y-auto overflow-x-hidden position-relative">
        <div class="d-flex flex-column justify-content-center align-items-center text-muted tms-loader-wrapper h-100">
            <h6 class="fw-bold mb-3 text-uppercase tms-loader-text" i18n="loader.description"></h6>
            <div class="tms-loader-bar">
                <div class="tms-loader-progress"></div>
            </div>
        </div>
    </div>
</div>

<script src="./js/lang/text.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
